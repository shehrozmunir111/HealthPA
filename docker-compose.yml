version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthpa-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/healthpa
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      # AWS SES
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # AI layer (grounded coding / RAG / HITL). LM Studio runs on the host;
      # host.docker.internal lets the container reach it.
      - AI_ENABLED=${AI_ENABLED:-True}
      - CHAT_LLM_PROVIDER=${CHAT_LLM_PROVIDER:-openai}
      - CHAT_LLM_MODEL=${CHAT_LLM_MODEL:-google/gemma-4-12b-qat}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - RAG_VECTOR_BACKEND=${RAG_VECTOR_BACKEND:-pinecone}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX=${PINECONE_INDEX:-healthpa-ai}
      - HITL_CHECKPOINTER=${HITL_CHECKPOINTER:-postgres}
      - ENABLE_WEB_SEARCH=${ENABLE_WEB_SEARCH:-True}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-False}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-HealthPA-AI}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/ocr_uploads:/app/data/ocr_uploads
      - ./data/rag_state:/app/data/rag_state
      - ./data/policies:/app/data/policies
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - healthpa-network

  db:
    image: postgres:15-alpine
    container_name: healthpa-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=healthpa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthpa-network

  redis:
    image: redis:7-alpine
    container_name: healthpa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healthpa-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthpa-celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/healthpa
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      # AWS SES
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - db
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./data/ocr_uploads:/app/data/ocr_uploads
    networks:
      - healthpa-network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthpa-celery-beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/healthpa
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      # AWS SES
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - db
      - redis
    # --schedule keeps the beat DB inside the container; fine for single-instance deployments
    command: celery -A app.core.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    networks:
      - healthpa-network

volumes:
  postgres_data:
  redis_data:

networks:
  healthpa-network:
    driver: bridge
